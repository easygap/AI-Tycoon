<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff3df"/>
      <stop offset="1" stop-color="#ffb88a"/>
    </linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a5d4ff"/>
      <stop offset="0.5" stop-color="#ffd09e"/>
      <stop offset="1" stop-color="#ff9d6c"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#fff5b6"/>
      <stop offset="0.6" stop-color="#ffc060"/>
      <stop offset="1" stop-color="#ffc060" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Window -->
  <g transform="translate(96 80)">
    <rect width="320" height="200" rx="20" fill="#2a1a10"/>
    <rect x="12" y="12" width="296" height="176" rx="12" fill="url(#sky)"/>
    <!-- Sun -->
    <circle cx="220" cy="80" r="38" fill="url(#sun)"/>
    <circle cx="220" cy="80" r="22" fill="#fff5b6"/>
    <!-- Cloud -->
    <ellipse cx="80" cy="60" rx="42" ry="14" fill="rgba(255,255,255,0.85)"/>
    <ellipse cx="105" cy="50" rx="30" ry="11" fill="rgba(255,255,255,0.85)"/>
    <!-- City silhouette -->
    <rect x="12" y="148" width="20" height="40" fill="rgba(40,55,80,0.55)"/>
    <rect x="36" y="128" width="24" height="60" fill="rgba(40,55,80,0.55)"/>
    <rect x="64" y="138" width="20" height="50" fill="rgba(40,55,80,0.55)"/>
    <rect x="88" y="118" width="28" height="70" fill="rgba(40,55,80,0.55)"/>
    <rect x="120" y="138" width="20" height="50" fill="rgba(40,55,80,0.55)"/>
    <rect x="144" y="128" width="22" height="60" fill="rgba(40,55,80,0.55)"/>
    <rect x="170" y="148" width="20" height="40" fill="rgba(40,55,80,0.55)"/>
    <rect x="240" y="138" width="22" height="50" fill="rgba(40,55,80,0.55)"/>
    <rect x="266" y="128" width="20" height="60" fill="rgba(40,55,80,0.55)"/>
  </g>
  <!-- Desk -->
  <g transform="translate(80 320)">
    <rect width="352" height="32" rx="6" fill="#704f35"/>
    <rect y="32" width="352" height="80" fill="#8a5e40"/>
  </g>
  <!-- Monitor on desk -->
  <g transform="translate(176 240)">
    <rect width="160" height="100" rx="10" fill="#2a1a10"/>
    <rect x="12" y="12" width="136" height="76" rx="6" fill="#34d399"/>
    <rect x="22" y="22" width="80" height="6" rx="2" fill="rgba(0,0,0,0.18)"/>
    <rect x="22" y="36" width="60" height="6" rx="2" fill="rgba(0,0,0,0.18)"/>
    <rect x="22" y="50" width="100" height="6" rx="2" fill="rgba(0,0,0,0.18)"/>
    <rect x="22" y="64" width="50" height="6" rx="2" fill="rgba(0,0,0,0.18)"/>
  </g>
  <!-- Character (pixel-style) -->
  <g transform="translate(116 348)">
    <!-- Body -->
    <rect width="36" height="44" rx="10" fill="#FFB3C6"/>
    <!-- Head -->
    <rect x="6" y="-22" width="24" height="22" rx="8" fill="#F5D5C8"/>
    <!-- Hair -->
    <rect x="4" y="-26" width="28" height="10" rx="6" fill="#1A1A2E"/>
    <!-- Eyes -->
    <rect x="11" y="-11" width="3" height="3" fill="#1A1A2E"/>
    <rect x="22" y="-11" width="3" height="3" fill="#1A1A2E"/>
  </g>
</svg>
