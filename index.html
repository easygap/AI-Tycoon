<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tycoon</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23F0E8D0' rx='20' width='100' height='100'/><text x='50' y='72' font-size='56' text-anchor='middle'>🏢</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css">
    <script src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Pretendard', 'system-ui', 'sans-serif'],
                    },
                },
            },
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#FBF8F4] text-zinc-700 font-sans overflow-hidden h-[100dvh] h-[100vh]">

    <div id="app" class="flex flex-col h-full">

        <!-- ── Nav Bar ── -->
        <header class="flex items-center gap-2 md:gap-4 px-3 md:px-5 py-2.5 border-b border-amber-200/60 bg-white/70 backdrop-blur-2xl z-10 shrink-0">
            <div class="flex items-center gap-2 shrink-0">
                <div class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse shadow-sm shadow-emerald-300"></div>
                <span class="text-[15px] font-bold text-zinc-800 tracking-tight">AI Tycoon</span>
            </div>

            <!-- Connection Status -->
            <div id="conn-badge" class="flex items-center gap-1.5 px-2 py-0.5 rounded-full bg-zinc-100 ring-1 ring-zinc-200/60 text-[11px] text-zinc-500 shrink-0">
                <div id="conn-dot" class="w-1.5 h-1.5 rounded-full bg-zinc-400"></div>
                <span id="conn-text">연결 중</span>
            </div>

            <!-- Clock -->
            <div class="hidden sm:flex items-center gap-1.5 px-2 py-0.5 rounded-full bg-zinc-50 ring-1 ring-zinc-200/60 shrink-0">
                <iconify-icon icon="solar:clock-circle-linear" class="text-amber-400 text-xs"></iconify-icon>
                <span id="game-time" class="text-[11px] text-zinc-600 font-medium tabular-nums">--:--</span>
            </div>

            <div class="flex-1"></div>

            <!-- Stats (compact — visible on sm+) -->
            <div class="hidden sm:flex items-center gap-3 md:gap-5 text-[11px] text-zinc-500 font-medium">
                <div class="flex items-center gap-1" title="완료/전체 태스크">
                    <iconify-icon icon="solar:checklist-minimalistic-linear" class="text-emerald-500 text-xs"></iconify-icon>
                    <span class="text-zinc-700 tabular-nums"><span id="stat-completed">0</span>/<span id="stat-tasks">0</span></span>
                </div>
                <div class="hidden md:flex items-center gap-1" title="총 메모리 사용량">
                    <iconify-icon icon="solar:cpu-bolt-linear" class="text-rose-400 text-xs"></iconify-icon>
                    <span><span id="stat-ram" class="text-zinc-700 tabular-nums">0</span>MB</span>
                </div>
                <div class="flex items-center gap-1" title="활성 에이전트 수">
                    <iconify-icon icon="solar:users-group-rounded-linear" class="text-blue-400 text-xs"></iconify-icon>
                    <span class="text-zinc-700 tabular-nums"><span id="stat-agents">0</span></span>
                </div>
            </div>

            <!-- Dark Mode Toggle -->
            <button id="dark-toggle" onclick="toggleDarkMode()" class="w-7 h-7 rounded-lg flex items-center justify-center bg-zinc-100 hover:bg-zinc-200 active:scale-95 transition-all shrink-0" title="다크모드 전환" aria-label="다크모드 전환">
                <iconify-icon id="dark-icon" icon="solar:moon-linear" class="text-zinc-500 text-sm"></iconify-icon>
            </button>

            <!-- Side Panel Toggle -->
            <button id="panel-toggle" onclick="toggleSidePanel()" class="w-7 h-7 rounded-lg flex items-center justify-center bg-zinc-100 hover:bg-zinc-200 active:scale-95 transition-all shrink-0 md:hidden" title="패널 토글" aria-label="사이드 패널 토글">
                <iconify-icon icon="solar:sidebar-minimalistic-linear" class="text-zinc-500 text-sm"></iconify-icon>
            </button>
        </header>

        <!-- ── Main ── -->
        <div id="main-content" class="flex flex-1 overflow-hidden">

            <!-- Canvas -->
            <div class="flex-1 relative">
                <canvas id="office-canvas" class="block w-full h-full"></canvas>
            </div>

            <!-- ── Side Panel ── -->
            <aside id="side-panel" class="side-panel w-[300px] shrink-0 border-l border-amber-200/40 bg-white/50 backdrop-blur-xl flex flex-col overflow-hidden">

                <!-- Boss Review Queue Panel -->
                <div id="boss-queue-panel" class="hidden shrink-0 border-b border-amber-200/40 p-3 overflow-y-auto max-h-[40%]"></div>

                <!-- Agent Detail Panel (shown when agent clicked) -->
                <div id="detail-panel" class="hidden shrink-0 border-b border-amber-200/40 p-3 overflow-y-auto max-h-[50%]"></div>

                <!-- Agents Section -->
                <div class="flex-1 overflow-y-auto p-3">
                    <div class="flex items-center gap-2 mb-2">
                        <iconify-icon icon="solar:users-group-rounded-linear" class="text-amber-500 text-sm"></iconify-icon>
                        <h3 class="text-[12px] font-bold text-zinc-600 tracking-wide uppercase">에이전트</h3>
                        <span id="agent-count" class="text-[10px] text-zinc-400 tabular-nums ml-auto"></span>
                    </div>
                    <!-- Filter & Sort -->
                    <div id="filter-bar" class="flex flex-wrap gap-1 mb-2">
                        <button class="filter-chip active" data-filter="all" onclick="setFilter('all')">전체</button>
                        <button class="filter-chip" data-filter="coding" onclick="setFilter('coding')">코딩 중</button>
                        <button class="filter-chip" data-filter="idle" onclick="setFilter('idle')">대기</button>
                        <button class="filter-chip" data-filter="offline" onclick="setFilter('offline')">오프라인</button>
                    </div>
                    <div id="platform-filter" class="flex flex-wrap gap-1 mb-2"></div>
                    <div class="flex items-center gap-1 mb-3">
                        <select id="sort-select" onchange="setSortOrder(this.value)" class="text-[10px] bg-transparent border border-amber-200/40 rounded-md px-1.5 py-0.5 text-zinc-500 outline-none" aria-label="정렬 기준">
                            <option value="status">상태순</option>
                            <option value="memory">메모리순</option>
                            <option value="platform">플랫폼순</option>
                            <option value="project">프로젝트순</option>
                            <option value="recent">최근 활동순</option>
                        </select>
                    </div>
                    <div id="agents-list" class="flex flex-col gap-2"></div>
                </div>

                <!-- Chat Log -->
                <div class="h-[180px] shrink-0 border-t border-amber-200/40 p-3 overflow-hidden flex flex-col">
                    <div class="flex items-center gap-2 mb-2">
                        <iconify-icon icon="solar:chat-round-dots-linear" class="text-rose-400 text-sm"></iconify-icon>
                        <h3 class="text-[12px] font-bold text-zinc-600 tracking-wide uppercase">대화</h3>
                    </div>
                    <div id="activity-log" class="flex-1 overflow-y-auto flex flex-col gap-1"></div>
                </div>
            </aside>
        </div>
    </div>

    <!-- Tooltip -->
    <div id="tooltip" class="hidden fixed z-50 pointer-events-none"></div>

    <script>
    // Dark mode: user choice > system preference
    function applyDark(isDark) {
        document.body.classList.toggle("dark", isDark);
        const icon = document.getElementById("dark-icon");
        if (icon) icon.setAttribute("icon", isDark ? "solar:sun-linear" : "solar:moon-linear");
    }
    function toggleDarkMode() {
        const isDark = !document.body.classList.contains("dark");
        localStorage.setItem("ai-tycoon-dark", isDark); // explicit user choice
        applyDark(isDark);
    }
    function closeDetail() {
        const dp = document.getElementById("detail-panel");
        if (dp) dp.classList.add("hidden");
        if (window.__clearDetailPid) window.__clearDetailPid();
    }
    function toggleSidePanel() {
        const panel = document.getElementById("side-panel");
        panel.classList.toggle("panel-hidden");
        setTimeout(() => window.dispatchEvent(new Event("resize")), 350);
    }
    // Resolve initial dark mode: explicit choice → system preference
    (function() {
        const stored = localStorage.getItem("ai-tycoon-dark");
        let isDark;
        if (stored !== null) {
            isDark = stored === "true";
        } else {
            isDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        }
        if (isDark) document.body.classList.add("dark");
        document.addEventListener("DOMContentLoaded", () => applyDark(isDark));
        // Listen for system theme changes (only when no explicit user choice)
        window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", (e) => {
            if (localStorage.getItem("ai-tycoon-dark") === null) {
                applyDark(e.matches);
            }
        });
    })();
    </script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
